spring:
  application:
    name: queueless-backend
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:queueless}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:admin123}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db
    baseline-on-migrate: true
    out-of-order: false
    validate-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
      timeout: 2000ms
      repositories:
        enabled: false
      lettuce:
        pool:
          max-active: 10
          max-idle: 8
          min-idle: 2

  cache:
    type: redis
    redis:
      time-to-live: 600000

  websocket:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

app:
  oauth-success-redirect: ${OAUTH_SUCCESS_REDIRECT:http://localhost:5173/oauth2/callback}

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: gemini-1.5-flash

server:
  port: ${PORT:8080}
  address: 0.0.0.0
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  error:
    include-message: never
    include-binding-errors: never

jwt:
  secret: ${JWT_SECRET:local-testing-only-replace-this-in-production}
  access-token-expiry: 3600000
  refresh-token-expiry: 604800000

msg91:
  auth-key: ${MSG91_AUTH_KEY:}
  sender-id: QLESS
  template-id: ${MSG91_TEMPLATE_ID:}
  api-url: https://api.msg91.com/api/v5/flow

razorpay:
  key-id: ${RAZORPAY_KEY_ID:}
  key-secret: ${RAZORPAY_KEY_SECRET:}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}

queue:
  sms-alert-threshold: 3
  max-tokens-per-day: 500
  token-expiry-hours: 4

rate-limit:
  otp:
    capacity: 3
    refill-tokens: 3
    refill-duration-minutes: 15
  api:
    capacity: 100
    refill-tokens: 100
    refill-duration-minutes: 1

logging:
  level:
    com.queueless: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{requestId:-no-request-id}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{requestId:-no-request-id}] %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS:minioadmin}
  secret-key: ${MINIO_SECRET:minioadmin}
  bucket: ${MINIO_BUCKET:attachments}

# === Unified Storage with Failover ===
storage:
  primary-provider: ${STORAGE_PRIMARY:supabase}
  fallback-provider: ${STORAGE_FALLBACK:cloudinary}
  fallback-enabled: true
  max-retries: 2
  supabase:
    url: ${SUPABASE_URL:}
    service-key: ${SUPABASE_SERVICE_KEY:}
    bucket: ${SUPABASE_STORAGE_BUCKET:attachments}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
    folder: queueless

# === Email Service (MailerSend) ===
email:
  api-key: ${MAILERSEND_API_KEY:}
  from-email: ${EMAIL_FROM:noreply@queueless.in}
  from-name: QueueLess
  enabled: ${EMAIL_ENABLED:false}
