spring:
  application:
    name: queueless-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 180000
      max-lifetime: 240000
      keepalive-time: 60000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        default_schema: public
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: true
      timeout: 3000ms
      repositories:
        enabled: false
      lettuce:
        pool:
          max-active: 5
          max-idle: 3
          min-idle: 1

  cache:
    type: redis
    redis:
      time-to-live: 600000

  websocket:
    allowed-origins: ${ALLOWED_ORIGINS}

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - email
              - profile

server:
  port: ${PORT:8080}
  address: 0.0.0.0
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  error:
    include-message: never
    include-binding-errors: never

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 3600000
  refresh-token-expiry: 604800000

msg91:
  auth-key: ${MSG91_AUTH_KEY:}
  sender-id: QLESS
  template-id: ${MSG91_TEMPLATE_ID:}
  api-url: https://api.msg91.com/api/v5/flow

razorpay:
  key-id: ${RAZORPAY_KEY_ID:}
  key-secret: ${RAZORPAY_KEY_SECRET:}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}

queue:
  sms-alert-threshold: 3
  max-tokens-per-day: 500
  token-expiry-hours: 4

rate-limit:
  otp:
    capacity: 3
    refill-tokens: 3
    refill-duration-minutes: 15
  api:
    capacity: 100
    refill-tokens: 100
    refill-duration-minutes: 1

logging:
  level:
    com.queueless: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{HH:mm:ss} %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never

minio:
  endpoint: ${MINIO_ENDPOINT:}
  access-key: ${MINIO_ACCESS:}
  secret-key: ${MINIO_SECRET:}
  bucket: ${MINIO_BUCKET:attachments}

# === New: Unified Storage with Failover ===
storage:
  primary-provider: ${STORAGE_PRIMARY:supabase}
  fallback-provider: ${STORAGE_FALLBACK:cloudinary}
  fallback-enabled: true
  max-retries: 2
  supabase:
    url: ${SUPABASE_URL:}
    service-key: ${SUPABASE_SERVICE_KEY:}
    bucket: ${SUPABASE_STORAGE_BUCKET:attachments}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
    folder: queueless

# === New: Email Service (MailerSend) ===
email:
  api-key: ${MAILERSEND_API_KEY:}
  from-email: ${EMAIL_FROM:noreply@queueless.in}
  from-name: QueueLess
  enabled: ${EMAIL_ENABLED:true}
